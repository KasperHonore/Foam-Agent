name: Publish Docker image

# Builds docker/Dockerfile and pushes it to GHCR so users can `docker pull`
# instead of spending 30-45 minutes building the ~29 GB image locally.
#
# Tags produced:
#   ghcr.io/<owner>/foamagent:latest    — every push to main that touches the image
#   ghcr.io/<owner>/foamagent:vX.Y.Z    — on published releases
#   ghcr.io/<owner>/foamagent:sha-<sha> — always, for pinning

on:
  push:
    branches: [main]
    paths:
      - docker/**
      - src/**
      - database/**
      - environment.yml
      - pyproject.toml
      - .github/workflows/docker-publish.yml
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      # The final image is ~29 GB uncompressed; stock runners don't have the
      # headroom for the build layers, so reclaim ~30 GB of preinstalled tooling.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h /

      - name: Checkout (with LFS — FAISS indices are baked into the image)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/foamagent
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern=v{{version}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
