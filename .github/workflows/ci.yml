name: CI

# One fast job: the key-free unit suite on the minimum supported Python (3.10,
# per pyproject.toml, so it guards the floor). These tests are pure-Python
# (file I/O, log parsing, path + mesh parsing) and run in well under a second —
# the job's ~20s is checkout + Python setup, not the tests. The live-server MCP
# test is excluded (it needs OpenFOAM running).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install pytest
        run: python -m pip install --upgrade pip pytest
      - name: Run unit suite
        run: pytest -v -m "not integration" --ignore=tests/test_lid_driven_cavity_mcp.py
